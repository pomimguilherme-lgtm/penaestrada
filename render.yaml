services:
  - type: web
    name: penaestrada-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://penaestrada.vercel.app
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
